<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>oh my pi · authentication</title>
		<style>
			:root {
				/* dark, slightly purple-tinted neutrals — never #000 */
				--ink-0: oklch(0.135 0.018 295);
				--ink-1: oklch(0.172 0.022 295);
				--ink-2: oklch(0.21 0.024 295);
				--ink-4: oklch(0.36 0.024 295);
				--ink-5: oklch(0.5 0.022 290);
				--ink-6: oklch(0.66 0.018 290);
				--ink-7: oklch(0.82 0.014 285);
				--ink-9: oklch(0.97 0.008 90);

				/* brand: magenta lead, cyan reply */
				--magenta: oklch(0.7 0.24 340);
				--iris: oklch(0.62 0.21 295);
				--cyan: oklch(0.81 0.14 200);

				/* signal */
				--success: oklch(0.78 0.16 150);
				--error: oklch(0.66 0.22 25);

				--bg: var(--ink-0);
				--fg: var(--ink-9);
				--fg-dim: var(--ink-7);
				--fg-faint: var(--ink-5);
				--rule: oklch(1 0 0 / 0.07);
				--rule-strong: oklch(1 0 0 / 0.14);
				--accent: var(--magenta);
				--accent-2: var(--cyan);

				color-scheme: dark;
			}

			* {
				box-sizing: border-box;
			}

			body {
				font-family: "Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				background:
					radial-gradient(ellipse 80vw 60vh at 18% -10%, oklch(0.7 0.24 340 / 0.13), transparent 60%),
					radial-gradient(ellipse 70vw 70vh at 110% 30%, oklch(0.81 0.14 200 / 0.09), transparent 60%),
					var(--bg);
				color: var(--fg);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				padding: 1.5rem;
				-webkit-font-smoothing: antialiased;
				text-rendering: optimizeLegibility;
				overflow-x: clip;
			}

			/* ascii grid backdrop */
			.grid-bg {
				position: fixed;
				inset: 0;
				background-image:
					linear-gradient(to right, oklch(1 0 0 / 0.025) 1px, transparent 1px),
					linear-gradient(to bottom, oklch(1 0 0 / 0.025) 1px, transparent 1px);
				background-size: 56px 56px;
				background-position: -1px -1px;
				mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%);
				pointer-events: none;
				z-index: 0;
			}

			.container {
				position: relative;
				z-index: 1;
				background: oklch(0.172 0.022 295 / 0.72);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				border: 1px solid var(--rule);
				border-radius: 16px;
				padding: 2.5rem 2.5rem 2rem;
				width: 100%;
				max-width: 420px;
				text-align: center;
				box-shadow:
					0 24px 48px -12px oklch(0 0 0 / 0.55),
					0 0 0 1px oklch(1 0 0 / 0.03) inset;
				opacity: 0;
				transform: translateY(10px);
				animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			}
			@keyframes rise {
				to {
					opacity: 1;
					transform: none;
				}
			}

			/* brand header */
			.brand {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				margin-bottom: 2rem;
			}
			.brand svg {
				width: 22px;
				height: 22px;
			}
			.brand .wordmark {
				font-size: 13px;
				font-weight: 500;
				letter-spacing: -0.01em;
				color: var(--fg);
			}

			/* status mark */
			.mark-wrap {
				position: relative;
				width: 72px;
				height: 72px;
				margin: 0 auto 1.5rem;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.mark-wrap::before {
				content: "";
				position: absolute;
				inset: 0;
				border-radius: 50%;
				background: oklch(1 0 0 / 0.05);
				z-index: 0;
			}
			.mark {
				width: 40px;
				height: 40px;
				z-index: 2;
			}
			.timer-svg {
				position: absolute;
				top: -2px;
				left: -2px;
				width: 76px;
				height: 76px;
				transform: rotate(-90deg);
				z-index: 1;
				pointer-events: none;
			}
			.timer-circle {
				fill: none;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-dasharray: 226;
				stroke-dashoffset: 0;
			}
			.countdown .timer-circle {
				animation: countdown 3s linear forwards;
			}
			@keyframes countdown {
				to {
					stroke-dashoffset: 226;
				}
			}

			h1 {
				font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
				font-size: 1.6rem;
				font-weight: 500;
				letter-spacing: -0.022em;
				line-height: 1.15;
				margin: 0 0 0.75rem;
				text-wrap: balance;
			}
			p {
				color: var(--fg-dim);
				line-height: 1.6;
				margin: 0 0 1.75rem;
				font-size: 0.95rem;
			}

			.btn {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				background: var(--fg);
				color: var(--bg);
				font-family: inherit;
				font-weight: 500;
				padding: 0.65rem 1.4rem;
				border-radius: 8px;
				text-decoration: none;
				font-size: 0.9rem;
				transition: opacity 0.2s, transform 0.2s;
				cursor: pointer;
				border: none;
			}
			.btn:hover {
				opacity: 0.88;
				transform: translateY(-1px);
			}
			.btn:active {
				transform: translateY(0);
			}

			/* State: success */
			.success .mark-wrap::before {
				background: oklch(0.78 0.16 150 / 0.12);
			}
			.success .mark {
				color: var(--success);
			}
			.success .timer-circle {
				stroke: var(--success);
			}
			.success .icon-error {
				display: none;
			}

			/* State: error */
			.error .mark-wrap::before {
				background: oklch(0.66 0.22 25 / 0.12);
			}
			.error .mark {
				color: var(--error);
			}
			.error .timer-circle {
				stroke: var(--error);
			}
			.error .icon-success,
			.error .timer-svg {
				display: none;
			}

			@media (prefers-reduced-motion: reduce) {
				.container,
				.countdown .timer-circle {
					animation: none;
				}
				.container {
					opacity: 1;
					transform: none;
				}
			}
		</style>
	</head>
	<body>
		<span aria-hidden="true" class="grid-bg"></span>
		<div id="app" class="container">
			<div class="brand">
				<svg viewBox="0 0 64 64" aria-hidden="true">
					<defs>
						<linearGradient id="pi-grad" x1="0" y1="0" x2="1" y2="1">
							<stop offset="0" stop-color="oklch(0.7 0.24 340)" />
							<stop offset=".5" stop-color="oklch(0.62 0.21 295)" />
							<stop offset="1" stop-color="oklch(0.81 0.14 200)" />
						</linearGradient>
					</defs>
					<path fill="url(#pi-grad)" d="M10 14h44v9H43v33h-9V23h-9v22h-9V23H10z" />
				</svg>
				<span class="wordmark">oh my pi</span>
			</div>

			<div class="mark-wrap">
				<svg class="timer-svg" viewBox="0 0 76 76">
					<circle class="timer-circle" cx="38" cy="38" r="36"></circle>
				</svg>
				<svg class="mark icon-success" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
					<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
				</svg>
				<svg class="mark icon-error" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
					<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
				</svg>
			</div>

			<h1 id="title">Authentication</h1>
			<p id="message"></p>
			<button onclick="window.close()" class="btn">Close Window</button>
		</div>

		<script id="server-state" type="application/json">
			__OAUTH_STATE__
		</script>

		<script>
			let serverState;
			try {
				serverState = JSON.parse(document.getElementById("server-state").textContent);
			} catch {
				const params = new URLSearchParams(window.location.search);
				serverState = {
					ok: params.get("ok") === "1",
					error: params.get("error") || "Authentication failed",
				};
			}

			const app = document.getElementById("app");
			const title = document.getElementById("title");
			const message = document.getElementById("message");

			if (serverState.ok) {
				app.classList.add("success", "countdown");
				title.textContent = "Authentication Successful";
				message.innerHTML = "You have successfully logged in.<br>You can now close this tab.";
				setTimeout(() => window.close(), 3000);
			} else {
				app.classList.add("error");
				title.textContent = "Authentication Failed";
				message.textContent = serverState.error || "An error occurred";
			}
		</script>
	</body>
</html>
