name: Setup system deps
description: >-
   Install the canvas/native runtime and desktop-build deps CI needs. No-op on
   the preloaded omp-kata runner image when they are present; self-heals on a
   stock runner by installing via apt.

runs:
   using: composite
   steps:
      - name: Install system deps (skip when preloaded)
        shell: bash
        run: |
           # The preloaded omp-kata runner image bakes these in. Detect that
           # and skip the apt round-trip; otherwise install the exact same set so
           # stock runners (and any future host) still work.
           if command -v fd >/dev/null 2>&1 \
              && command -v rg >/dev/null 2>&1 \
              && command -v magick >/dev/null 2>&1 \
              && pkg-config --exists cairo pango libdrm egl gbm libpipewire-0.3 wayland-client xcb xcb-randr xkbcommon 2>/dev/null; then
             echo "System deps already present (preloaded runner image); skipping apt."
             exit 0
           fi
           sudo apt-get update
           sudo apt-get install -y \
             build-essential \
             fd-find \
             imagemagick \
             libcairo2-dev \
             libdrm-dev \
             libegl1-mesa-dev \
             libgbm-dev \
             libgif-dev \
             libjpeg-dev \
             libpango1.0-dev \
             libpipewire-0.3-dev \
             librsvg2-dev \
             libwayland-dev \
             libxcb-randr0-dev \
             libxcb1-dev \
             libxkbcommon-dev \
             ripgrep
           sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
           sudo ln -sf /usr/bin/convert /usr/local/bin/magick
