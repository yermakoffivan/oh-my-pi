# Vendored from uutils/coreutils tag 0.8.0 (src/uu/uname), patched to route
# output through pi-uutils-ctx so it can run in-process as a shell builtin. See
# src/uname.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_uname"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "uname ~ (uutils) display system information (vendored + patched for in-process embedding)"

[lib]
path = "src/uname.rs"

[dependencies]
platform-info = "2.0.3"
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
