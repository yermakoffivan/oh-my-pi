# Vendored from uutils/coreutils tag 0.8.0 (src/uu/tail), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/tail.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_tail"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "tail ~ (uutils) display the last lines of input (vendored + patched for in-process embedding)"

[lib]
path = "src/tail.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
memchr = "2.7.2"
uucore = { version = "0.8.0", features = ["fs", "parser-size", "signals"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
uu_tac = { path = "../uu-tac" }

[target.'cfg(not(target_os = "wasi"))'.dependencies]
libc = "0.2.172"
notify = { version = "=8.2.0", features = ["macos_kqueue"] }

[target.'cfg(unix)'.dependencies]
rustix = { version = "1.1.4", features = ["fs"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.0", default-features = false, features = [
  "Win32_System_Threading",
  "Win32_Foundation",
] }

[dev-dependencies]
rstest = "0.26.0"
tempfile = "3"
parking_lot = "0.12"
