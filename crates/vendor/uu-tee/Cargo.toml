# Vendored from uutils/coreutils tag 0.8.0 (src/uu/tee), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/tee.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_tee"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "tee ~ (uutils) copy standard input to files and standard output (vendored + patched for in-process embedding)"

[lib]
path = "src/tee.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
