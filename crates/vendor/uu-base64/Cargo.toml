# Vendored from uutils/coreutils tag 0.8.0 (src/uu/base64), patched to expose
# an in-process entrypoint using pi-uutils-ctx streams. Shared implementation is
# in ../uu-base32; see source comments for `pi-uutils:` patch markers.
[package]
name = "uu_base64"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "base64 ~ (uutils) decode/encode input (vendored + patched for in-process embedding)"

[lib]
path = "src/base64.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["encoding"] }
uu_base32 = { path = "../uu-base32" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
