# Vendored from uutils/coreutils tag 0.8.0 (src/uu/whoami), patched to route
# output through pi-uutils-ctx so it can run in-process as a shell builtin. See
# src/whoami.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_whoami"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "whoami ~ (uutils) display user name of current effective user ID (vendored + patched for in-process embedding)"

[lib]
path = "src/whoami.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["entries", "process"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61.0", features = [
	"Win32_NetworkManagement_NetManagement",
	"Win32_System_WindowsProgramming",
	"Win32_Foundation",
] }

[dev-dependencies]
parking_lot = "0.12"
