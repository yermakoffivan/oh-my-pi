# Vendored from uutils/coreutils tag 0.8.0 (src/uu/ln), patched to resolve path
# arguments against the shell working directory and route I/O + prompts through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/ln.rs for
# the patch markers (`pi-uutils:` comments).
[package]
name = "uu_ln"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "ln ~ (uutils) create a (file system) link to TARGET (vendored + patched for in-process embedding)"

[lib]
path = "src/ln.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
thiserror = "2.0.3"
uucore = { version = "0.8.0", features = ["backup-control", "fs"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
