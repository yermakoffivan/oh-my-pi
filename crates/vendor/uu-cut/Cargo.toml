# Vendored from uutils/coreutils tag 0.8.0 (src/uu/cut), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/cut.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_cut"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "cut ~ (uutils) display byte/field columns of input lines (vendored + patched for in-process embedding)"

[lib]
path = "src/cut.rs"

[dependencies]
bstr = "1.12.0"
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
memchr = "2.7.4"
uucore = { version = "0.8.0", features = ["ranges"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
