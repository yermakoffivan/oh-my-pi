# Vendored from uutils/coreutils tag 0.8.0 (src/uu/printenv), patched to read
# the environment from the shell scope and route I/O through pi-uutils-ctx so
# it can run in-process as a shell builtin. See src/printenv.rs for the patch
# markers (`pi-uutils:` comments).
[package]
name = "uu_printenv"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "printenv ~ (uutils) display value of environment VAR (vendored + patched for in-process embedding)"

[lib]
path = "src/printenv.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
