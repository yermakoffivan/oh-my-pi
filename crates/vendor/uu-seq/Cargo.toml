# Vendored from uutils/coreutils tag 0.8.0 (src/uu/seq), patched to route I/O
# through pi-uutils-ctx so it can run in-process as a shell builtin. See
# src/seq.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_seq"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "seq ~ (uutils) display a sequence of numbers (vendored + patched for in-process embedding)"

[lib]
path = "src/seq.rs"

[dependencies]
bigdecimal = "0.4"
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
num-bigint = "0.4"
num-traits = "0.2"
thiserror = "2.0.3"
# pi-uutils: upstream also enables "signals" (SIGPIPE probing) — dropped, the
# in-process builtin has no process-global signal handling.
uucore = { version = "0.8.0", features = [
	"extendedbigdecimal",
	"fast-inc",
	"format",
	"parser",
	"quoting-style",
] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
