# Vendored from uutils/coreutils tag 0.8.0 (src/uu/sha224sum), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/sha224sum.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_sha224sum"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "sha224sum ~ (uutils) print or check SHA224 checksums (vendored + patched for in-process embedding)"

[lib]
path = "src/sha224sum.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["checksum", "encoding", "sum", "hardware"] }
uu_checksum_common = { path = "../uu-checksum-common" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
