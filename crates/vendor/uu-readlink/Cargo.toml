# Vendored from uutils/coreutils tag 0.8.0 (src/uu/readlink), patched to resolve
# path arguments against the shell working directory and route I/O through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/readlink.rs
# for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_readlink"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "readlink ~ (uutils) display resolved path of PATHNAME (vendored + patched for in-process embedding)"

[lib]
path = "src/readlink.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["fs"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
