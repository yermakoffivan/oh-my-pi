# Vendored from uutils/coreutils tag 0.8.0 (src/uu/b2sum), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/b2sum.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_b2sum"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "b2sum ~ (uutils) blake2b checksum (vendored + patched for in-process embedding)"

[lib]
path = "src/b2sum.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["checksum", "encoding", "sum", "hardware"] }
uu_checksum_common = { path = "../uu-checksum-common" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
