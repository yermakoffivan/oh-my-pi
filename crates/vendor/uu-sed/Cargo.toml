# Vendored from uutils/sed commit b37e23fa987888572e02e4e9b6906b3ede749bc6,
# patched for in-process embedding through pi-uutils-ctx.
[package]
name = "uu_sed"
version = "0.1.1"
edition = "2024"
license = "MIT"
description = "sed ~ (uutils) stream editor for filtering and transforming text (vendored + patched for in-process embedding)"

[lib]
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo"] }
fancy-regex = "0.18"
memchr = "2.7"
regex = "1.11"
tempfile = "3"
uucore = { version = "0.9.0", features = ["libc"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[target.'cfg(unix)'.dependencies]
memmap2 = "0.9"

[dev-dependencies]
parking_lot = "0.12"
