# Vendored from uutils/coreutils tag 0.8.0 (src/uu/base32), patched to route I/O
# and path resolution through pi-uutils-ctx for safe in-process embedding.
# See src/base_common.rs and src/base32.rs for `pi-uutils:` patch markers.
[package]
name = "uu_base32"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "base32 ~ (uutils) decode/encode input (vendored + patched for in-process embedding)"

[lib]
path = "src/base32.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["encoding"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
