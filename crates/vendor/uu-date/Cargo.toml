# Vendored from uutils/coreutils tag 0.8.0 (src/uu/date), patched to resolve
# path arguments against the shell working directory and route I/O through
# pi-uutils-ctx so it can run in-process as a shell builtin. The set-date
# capability (and its libc/windows-sys settime dependencies) is removed
# entirely, along with the fluent/icu localization stack. See src/date.rs for
# the patch markers (`pi-uutils:` comments).
[package]
name = "uu_date"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "date ~ (uutils) display the current time (vendored + patched for in-process embedding)"

[lib]
path = "src/date.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
jiff = { version = "0.2", features = [
	"tzdb-bundle-platform",
	"tzdb-zoneinfo",
	"tzdb-concatenated",
] }
parse_datetime = "0.14"
regex = "1.11"
uucore = { version = "0.8.0", features = ["parser"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

# pi-uutils: rustix is kept only for `clock_getres` (--resolution); the
# `clock_settime` user is gone with the set-date capability.
[target.'cfg(unix)'.dependencies]
rustix = { version = "1.1", features = ["time"] }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
