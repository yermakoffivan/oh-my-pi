# Vendored from uutils/coreutils tag 0.8.0 (src/uu/touch), patched to resolve
# path arguments against the shell working directory and route I/O through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/touch.rs
# for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_touch"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "touch ~ (uutils) change FILE timestamps (vendored + patched for in-process embedding)"

[lib]
path = "src/touch.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
filetime = "0.2.23"
jiff = "0.2.18"
parse_datetime = "0.14.0"
thiserror = "2.0.3"
uucore = { version = "0.8.0", features = ["libc", "parser"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[target.'cfg(unix)'.dependencies]
libc = "0.2.172"
rustix = { version = "1.1.4", features = ["fs"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.0", default-features = false, features = [
  "Win32_Storage_FileSystem",
  "Win32_Foundation",
] }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
