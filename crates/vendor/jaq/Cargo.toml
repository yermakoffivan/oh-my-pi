[package]
name = "jaq"
version = "2.3.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[dependencies]
# Interpreter libraries from crates.io, pinned as upstream jaq v2.3.0 pins them.
jaq-core = "2.1.1"
jaq-std = "2.1.0"
jaq-json = "1.1.1"

codesnake = "0.2"
hifijson = "0.2.0"
memmap2 = "0.9"
tempfile = "3.3.0"
unicode-width = "0.1.13"
yansi = "1.0.1"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
tempfile = "3"
parking_lot = "0.12"
