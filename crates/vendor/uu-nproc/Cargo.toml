# Vendored from uutils/coreutils tag 0.8.0 (src/uu/nproc), patched to read the
# OMP_NUM_THREADS/OMP_THREAD_LIMIT environment variables from the shell scope
# environment and route I/O through pi-uutils-ctx so it can run in-process as a
# shell builtin. See src/nproc.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_nproc"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "nproc ~ (uutils) display the number of processing units available (vendored + patched for in-process embedding)"

[lib]
path = "src/nproc.rs"

[dependencies]
libc = "0.2.172"
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["fs"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
