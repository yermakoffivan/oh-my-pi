# Vendored from uutils/coreutils tag 0.8.0 (src/uu/hostname), patched to route
# output through pi-uutils-ctx and to reject the set-hostname path so it can run
# in-process as a shell builtin. See src/hostname.rs for the patch markers
# (`pi-uutils:` comments).
[package]
name = "uu_hostname"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "hostname ~ (uutils) display the host name of the current host (vendored + patched for in-process embedding)"

[lib]
path = "src/hostname.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
hostname = "0.4"
uucore = { version = "0.8.0", features = ["wide"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[target.'cfg(any(target_os = "freebsd", target_os = "openbsd"))'.dependencies]
dns-lookup = "3.0.0"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61.0", features = [
	"Win32_Networking_WinSock",
	"Win32_Foundation",
] }

[dev-dependencies]
parking_lot = "0.12"
