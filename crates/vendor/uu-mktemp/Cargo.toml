# Vendored from uutils/coreutils tag 0.8.0 (src/uu/mktemp), patched to resolve
# path arguments against the shell working directory and route I/O through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/mktemp.rs
# for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_mktemp"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "mktemp ~ (uutils) create and display a temporary file or directory from TEMPLATE (vendored + patched for in-process embedding)"

[lib]
path = "src/mktemp.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
rand = { version = "0.10.0", features = ["std_rng"] }
tempfile = "3.15.0"
thiserror = "2.0.3"
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
