# Vendored from uutils/coreutils tag 0.8.0 (src/uu/md5sum), with its
# standalone entrypoint supplied by the context-safe uu-checksum-common macro.
[package]
name = "uu_md5sum"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "md5sum ~ (uutils) Print or check the MD5 checksums (vendored + patched for in-process embedding)"

[lib]
path = "src/md5sum.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["checksum", "encoding", "sum", "hardware"] }
uu_checksum_common = { path = "../uu-checksum-common" }
