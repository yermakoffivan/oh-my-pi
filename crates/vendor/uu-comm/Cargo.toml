# Vendored from uutils/coreutils tag 0.8.0 (src/uu/comm), patched for
# in-process embedding through pi-uutils-ctx.
[package]
name = "uu_comm"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "comm ~ (uutils) compare two sorted files line by line (vendored + patched for in-process embedding)"

[lib]
path = "src/comm.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
