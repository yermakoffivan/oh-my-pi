# Vendored from uutils/coreutils tag 0.8.0 (src/uu/basename), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/basename.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_basename"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "basename ~ (uutils) display PATHNAME with leading directory components removed (vendored + patched for in-process embedding)"

[lib]
path = "src/basename.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
