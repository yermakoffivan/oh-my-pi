# Vendored from uutils/coreutils tag 0.8.0 (src/uu/paste), patched to route I/O
# and path resolution through pi-uutils-ctx so it can run in-process as a shell
# builtin. See src/paste.rs for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_paste"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "paste ~ (uutils) merge lines of files (vendored + patched for in-process embedding)"

[lib]
path = "src/paste.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0", features = ["i18n-charmap"] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
