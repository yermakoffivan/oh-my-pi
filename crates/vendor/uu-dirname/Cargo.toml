# Vendored from uutils/coreutils tag 0.8.0 (src/uu/dirname), patched to expose
# an in-process entrypoint using pi-uutils-ctx streams.
[package]
name = "uu_dirname"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "dirname ~ (uutils) display parent directory of PATHNAME (vendored + patched for in-process embedding)"

[lib]
path = "src/dirname.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
uucore = { version = "0.8.0" }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
