# Vendored from uutils/coreutils tag 0.8.0 (src/uu/tr), patched to route I/O
# through pi-uutils-ctx so it can run in-process as a shell builtin. See source
# patch markers and the context-safe `run` entrypoint in src/tr.rs.
[package]
name = "uu_tr"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "tr ~ (uutils) translate characters within input and display (vendored + patched for in-process embedding)"

[lib]
path = "src/tr.rs"

[dependencies]
bytecount = { version = "0.6.8", features = ["runtime-dispatch-simd"] }
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
nom = "8.0.0"
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }
