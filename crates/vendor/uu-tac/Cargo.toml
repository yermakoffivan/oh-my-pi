# Vendored from uutils/coreutils tag 0.8.0 (src/uu/tac), patched to resolve
# path arguments against the shell working directory and route I/O through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/tac.rs
# for the patch markers (`pi-uutils:` comments).
[package]
name = "uu_tac"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "tac ~ (uutils) concatenate and display input lines in reverse order (vendored + patched for in-process embedding)"

[lib]
path = "src/tac.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
memchr = "2.7.4"
memmap2 = "0.9"
regex = "1.11"
thiserror = "2.0.3"
uucore = "0.8.0"
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[dev-dependencies]
parking_lot = "0.12"
tempfile = "3"
